{% extends "base.html" %}

{% block title %}Create Workspace{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h4 mb-3">Create Workspace</h1>
                <p class="text-muted">Create a new workspace and become its owner.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Workspace Name</label>
                        <input class="form-control" type="text" name="name" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Create Workspace</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
