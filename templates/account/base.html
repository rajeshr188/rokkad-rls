{% extends "base.html" %}

{% block title %}{% block head_title %}Account{% endblock %} | RLS Rokkad{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-5">
        {% block inner_content %}{% endblock %}
    </div>
</div>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        document.querySelectorAll("form input, form select, form textarea").forEach(function (el) {
            if (el.type === "hidden") {
                return;
            }
            if (el.type === "checkbox" || el.type === "radio") {
                el.classList.add("form-check-input");
            } else if (el.type === "submit" || el.type === "reset") {
                el.classList.add("btn", "btn-primary", "w-100");
            } else if (!el.classList.contains("btn")) {
                el.classList.add("form-control");
            }
        });
    });
</script>
{% endblock %}
